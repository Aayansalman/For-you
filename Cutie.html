<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Dearest Darling 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(to bottom, #ffcad4 0%, #ffe5ec 40%, #ffebf0 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Romantic Park Scenery Background */
        .park-background {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45vh;
            background: linear-gradient(to bottom, #b7e4c7 0%, #95d5b2 100%);
            border-top-left-radius: 50% 30px;
            border-top-right-radius: 50% 30px;
            z-index: 1;
        }
        .park-tree {
            position: absolute;
            bottom: 40vh;
            font-size: 70px;
            opacity: 0.35;
            z-index: 1;
        }
        .swing-set {
            position: absolute;
            bottom: 22vh;
            left: 65%;
            width: 80px;
            height: 100px;
            border-left: 3px solid #6d4c41;
            border-right: 3px solid #6d4c41;
            border-top: 3px solid #6d4c41;
            z-index: 2;
        }
        .swing-plank {
            position: absolute;
            bottom: 15px;
            left: 10px;
            width: 54px;
            height: 6px;
            background: #a1887f;
            border-radius: 3px;
            animation: parkSwing 3s ease-in-out infinite alternate;
            transform-origin: top center;
        }
        @keyframes parkSwing {
            0% { transform: rotate(-8deg) translateX(-3px); }
            100% { transform: rotate(8deg) translateX(3px); }
        }

        /* Initial Screen Card */
        .container {
            text-align: center;
            width: 100%;
            max-width: 350px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.75);
            padding: 35px 22px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .btn {
            background: linear-gradient(45deg, #ff85a1, #ff477e);
            color: white;
            height: 56px;
            width: 100%;
            max-width: 260px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 28px;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 71, 126, 0.3);
        }
        .btn:active { transform: scale(0.97); }

        /* Animation Play Zone */
        .animation-zone {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        /* Baby Emojis Playing */
        .baby {
            position: absolute;
            font-size: 65px;
            bottom: 12vh;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
        }
        .baby-girl {
            left: 67%;
            z-index: 3;
            animation: happyJump 2s ease-in-out infinite alternate;
        }
        .baby-boy {
            left: -80px;
            z-index: 4;
        }

        /* Walking Animation Triggered by Javascript */
        .walk-over {
            animation: walkToGirl 3.5s forwards cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes walkToGirl {
            0% { left: -80px; transform: rotate(0deg); }
            15% { transform: rotate(-5deg); }
            30% { transform: rotate(5deg); }
            45% { transform: rotate(-5deg); }
            60% { transform: rotate(5deg); }
            75% { left: 45%; transform: rotate(0deg); }
            100% { left: 45%; transform: rotate(0deg); }
        }
        @keyframes happyJump {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* The Secret Pocket Letter Item */
        .secret-letter-item {
            position: absolute;
            font-size: 28px;
            opacity: 0;
            bottom: 17vh;
            left: 49%;
            z-index: 6;
        }
        .pop-out-pocket {
            animation: pocketExtract 1.5s 3.5s forwards ease-out;
        }
        @keyframes pocketExtract {
            0% { opacity: 0; transform: scale(0.3) translateY(10px); }
            50% { opacity: 1; transform: scale(1.3) translateY(-30px) rotate(15deg); }
            100% { opacity: 1; transform: scale(1) translateY(-15px) rotate(0deg); }
        }

        .letter-paper-screen {

            text-align: left;
